name: 06_Java_CI

on:
  push:
    branches:
      - main

jobs:
  java:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4

        with:
          distribution: temurin
          java-version: 17

      - name: Maven build
        run: mvn clean install
