name: 05-NodeJS-CI

on:
  push:
    branch:
      - main

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up of Node
        uses: actions/setup-node@v4

        with:
          node-version: 18
      - run: npm install
      - run: npm test 
